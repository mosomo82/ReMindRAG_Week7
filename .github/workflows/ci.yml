name: CI — ReMindRAG Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        # E501 (line too long) excluded — long prompts are intentional
        run: |
          flake8 ReMindRag/ tests/ eval/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503 \
            --exclude=venv,__pycache__,_loogle_tmp

  # ---------------------------------------------------------------------------
  # Job 2: Unit tests — all 26 mock-only tests (zero API cost)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests (26 total — mock LLM, zero API cost)
    runs-on: ubuntu-latest

    env:
      # Point HuggingFace to a cached location
      HF_HOME:             ${{ github.workspace }}/.hf_cache
      TRANSFORMERS_CACHE:  ${{ github.workspace }}/.hf_cache
      # Suppress HF auth warnings in CI
      HF_HUB_DISABLE_PROGRESS_BARS: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Cache the all-MiniLM-L6-v2 model weights between runs
      - name: Cache HuggingFace model weights
        uses: actions/cache@v4
        with:
          path: .hf_cache
          key: hf-all-minilm-l6-v2-${{ runner.os }}
          restore-keys: |
            hf-all-minilm-l6-v2-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_repro.txt

      # NLTK data required by chunking
      - name: Download NLTK punkt_tab
        run: python -c "import nltk; nltk.download('punkt_tab', quiet=True)"

      # Ensure required runtime directories exist
      - name: Create runtime directories
        run: mkdir -p logs Rag_Cache model_cache artifacts repro_model_cache

      # ------------------------------------------------------------------
      # Test Suite A: Reproducibility audit (17 tests)
      # ------------------------------------------------------------------
      - name: "[1/3] Reproducibility audit (17 tests)"
        run: python tests/test_reproducibility.py -v

      # ------------------------------------------------------------------
      # Test Suite B: Benchmark smoke tests (5 tests)
      # ------------------------------------------------------------------
      - name: "[2/3] Benchmark smoke tests (5 tests)"
        run: python tests/test_benchmark_smoke.py -v

      # ------------------------------------------------------------------
      # Test Suite C: Reproducibility variance tests (4 tests)
      # ------------------------------------------------------------------
      - name: "[3/3] Repro variance tests (4 tests)"
        run: python tests/test_repro_variance.py -v

      # Upload test artifacts on failure for debugging
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            logs/
            artifacts/
